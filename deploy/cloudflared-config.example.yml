# Config Cloudflare Tunnel — expose le port local 3000 en HTTPS.
# À copier dans ~/.cloudflared/config.yml puis adapter <user>, <TUNNEL_ID>.
# Un seul serveur Next.js, DEUX domaines (même app, routes différentes) :
#   justif.bleucitron.app      -> dépôt des justificatifs (/justificatifs)
#   pointages.bleucitron.net   -> dashboard des relances de pointages (/)
# Pré-requis (cf. docs/DEPLOY-MACMINI.md §5) :
#   cloudflared tunnel login
#   cloudflared tunnel create pointages
#   cloudflared tunnel route dns pointages justif.bleucitron.app
#   cloudflared tunnel route dns pointages pointages.bleucitron.net
tunnel: pointages
credentials-file: /Users/<user>/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: justif.bleucitron.app
    service: http://localhost:3000
  - hostname: pointages.bleucitron.net
    service: http://localhost:3000
  - service: http_status:404
